name: Deploy to WP Engine

on:
  push:
    branches:
      - main
      - stg
      - qa
      - dev

jobs:
  php-lint:
    name: PHP Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
      - name: Run PHP lint
        run: find . -name "*.php" -not -path "./vendor/*" | xargs -I{} php -l {}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: php-lint
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set environment name
        id: env
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "WPE_ENV=${{ secrets.WPE_PROD_ENV_NAME }}" >> $GITHUB_ENV
          elif [[ "${{ github.ref_name }}" == "stg" ]]; then
            echo "WPE_ENV=${{ secrets.WPE_STAGING_ENV_NAME }}" >> $GITHUB_ENV
          elif [[ "${{ github.ref_name }}" == "qa" ]]; then
            echo "WPE_ENV=${{ secrets.WPE_STAGING_ENV_NAME }}" >> $GITHUB_ENV
          elif [[ "${{ github.ref_name }}" == "dev" ]]; then
            echo "WPE_ENV=${{ secrets.WPE_DEV_ENV_NAME }}" >> $GITHUB_ENV
          fi

      - name: Deploy to WP Engine
        uses: wpengine/github-action-wpe-site-deploy@v3
        with:
          WPE_SSHG_KEY_PRIVATE: ${{ secrets.WPE_SSHG_KEY_PRIVATE }}
          WPE_ENV: ${{ env.WPE_ENV }}
